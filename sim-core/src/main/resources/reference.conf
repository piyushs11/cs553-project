# Default simulation configuration.
# These values are used unless overridden by application.conf
# or a per-experiment config file.
#
# Design rationale: reference.conf provides sensible defaults so that
# the system runs out of the box. Experiment-specific configs override
# only the parameters they need to change.

sim {
  seed = 42

  graph {
    nodeCount = 10
    edgeDensity = 0.4
    # If file is set, load graph from this path instead of generating
    # file = "outputs/graph.json"
  }

  messages {
    types = ["CONTROL", "PING", "GOSSIP", "WORK", "ACK"]
  }

  edgeLabeling {
    default = ["CONTROL", "PING"]
    overrides = []
  }

  traffic {
    tickIntervalMs = 50
    distributionFamily = "uniform"

    defaultPdf = [
      { msg = "PING",   p = 0.50 },
      { msg = "GOSSIP", p = 0.30 },
      { msg = "WORK",   p = 0.20 }
    ]

    perNodePdf = []
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 50, mode = "pdf" }
    ]
    inputs = [
      { node = 1 }
    ]
  }

  algorithms = ["echo-extinction", "ghs"]
  runDurationSeconds = 60
}