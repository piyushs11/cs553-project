# Large graph experiment — 30 nodes, dense.
# Purpose: stress test message volume and termination on a larger MST.
include classpath("reference.conf")

sim {
  seed = 303

  graph {
    nodeCount = 30
    edgeDensity = 0.5
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 100, mode = "pdf" },
      { node = 10, tickEveryMs = 100, mode = "pdf" },
      { node = 20, tickEveryMs = 100, mode = "pdf" }
    ]
    inputs = [
      { node = 5 }
    ]
  }

  algorithms = ["echo-extinction", "ghs"]
  runDurationSeconds = 20
}