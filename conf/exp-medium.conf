# Medium graph experiment — 15 nodes, moderate density.
# Purpose: test algorithm convergence speed under more concurrency.
include classpath("reference.conf")

sim {
  seed = 202

  graph {
    nodeCount = 15
    edgeDensity = 0.4
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 100, mode = "pdf" },
      { node = 5, tickEveryMs = 150, mode = "pdf" },
      { node = 10, tickEveryMs = 200, mode = "pdf" }
    ]
    inputs = [
      { node = 3 },
      { node = 7 }
    ]
  }

  algorithms = ["echo-extinction", "ghs"]
  runDurationSeconds = 12
}