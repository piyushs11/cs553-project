# Small graph experiment — 8 nodes, sparse.
# Purpose: verify correctness visually in logs.
include classpath("reference.conf")

sim {
  seed = 101

  graph {
    nodeCount = 8
    edgeDensity = 0.3
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 200, mode = "pdf" },
      { node = 1, tickEveryMs = 300, mode = "pdf" }
    ]
    inputs = [
      { node = 2 }
    ]
  }

  algorithms = ["echo-extinction", "ghs"]
  runDurationSeconds = 8
}